apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-training-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-training

  template:
    metadata:
      labels:
        app: devops-training

    spec:
      containers:
      - name: devops-training-container

        image: aakashg1230/devops-training-image:v1

        ports:
        - containerPort: 80
